<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Frota Municipal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Frota Municipal</h2>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">E-mail</label>
                <input type="email" id="email" class="w-full p-2 border rounded mt-1" value="admin@prefeitura.gov.br" required>
            </div>
            <div>
                <label class="block text-sm font-medium">Senha</label>
                <input type="password" id="senha" class="w-full p-2 border rounded mt-1" value="admin123" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Entrar</button>
        </form>
        <p id="erro" class="text-red-500 text-sm mt-4 hidden text-center"></p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const erroEl = document.getElementById('erro');

            try {
                const res = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await res.json();

                if (res.ok) {
                    // Salva o token no navegador
                    localStorage.setItem('token_frota', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    erroEl.innerText = data.message;
                    erroEl.classList.remove('hidden');
                }
            } catch (err) {
                alert('Erro ao conectar com o servidor');
            }
        };
    </script>
</body>
</html>
